name: Klerk spam monitor

on:
  workflow_dispatch:
  schedule:
    # Каждые 30 минут
    - cron: "*/30 * * * *"

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # нужно чтобы коммитить seen_ids.json обратно
    concurrency:
      group: klerk-monitor
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BITRIX_WEBHOOK: ${{ secrets.BITRIX_WEBHOOK }}
          BITRIX_CHAT_ID: ${{ secrets.BITRIX_CHAT_ID }}
          RUN_ONCE: "1"
          PYTHONIOENCODING: utf-8
        run: python monitor.py

      - name: Save seen_ids and spam_log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_ids.json spam_log.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update seen_ids and spam_log [skip ci]"
          git push
